# Hiperparâmetros do pipeline. Fonte única da verdade: consumido tanto pelo
# DVC (rastreamento de dependências) quanto pelos scripts (via src.config).

preprocess:
  # Eventos considerados sinal positivo de interação (feedback implícito)
  positive_events: [view, addtocart, transaction]
  # Mantém apenas usuários/itens com pelo menos N interações (densifica o dataset)
  min_user_interactions: 5
  min_item_interactions: 5

train:
  embedding_dim: 32
  learning_rate: 0.001
  epochs: 20
  patience: 3
  # Nº de itens negativos amostrados por positivo no treino
  negative_ratio: 1

evaluate:
  # Corte do ranking para as métricas @k
  k: 10
  # Nº de negativos usados para ranquear o item positivo de cada usuário (protocolo NCF)
  num_eval_negatives: 99
