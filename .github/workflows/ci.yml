name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instala o uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.26"

      - name: Sincroniza o ambiente
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Formatação (ruff format)
        run: uv run ruff format --check .

      - name: Testes (pytest)
        run: uv run pytest -q
