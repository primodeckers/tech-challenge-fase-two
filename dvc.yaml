stages:
  preprocess:
    cmd: python -m src.pipeline.preprocess
    deps:
      - src/pipeline/preprocess.py
      - src/data/loader.py
      - src/data/preprocess.py
      - data/raw/events.csv
    params:
      - configs/params.yaml:
          - preprocess
    outs:
      - data/processed/interactions.parquet

  featurize:
    cmd: python -m src.pipeline.featurize
    deps:
      - src/pipeline/featurize.py
      - src/features/encoding.py
      - src/features/split.py
      - data/processed/interactions.parquet
    outs:
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet
      - data/processed/metadata.json

  train:
    cmd: python -m src.pipeline.train
    deps:
      - src/pipeline/train.py
      - src/models/neural.py
      - src/models/factory.py
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/metadata.json
    params:
      - configs/params.yaml:
          - train
    outs:
      - models/model.pt
